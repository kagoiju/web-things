<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформить заказ - GameHistory</title>
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style-bootstrap.css">
<link rel="stylesheet" href="main.scss"> 

<link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 border border-secondary p-4 rounded bg-black shadow">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html" class="text-info">Главная</a></li>
                        <li class="breadcrumb-item active text-secondary">Заказ мерча</li>
                    </ol>
                </nav>

                <h2 class="text-warning mb-4"><i class="bi bi-cart4"></i> Оформление заказа ретро-консоли</h2>
                
                <form class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Ваше имя</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email для связи</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control bg-dark text-white border-secondary" placeholder="name@example.com">
                        </div>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Выберите платформу</label>
                        <select class="form-select bg-dark text-white border-secondary">
                            <option selected>Dendy / NES</option>
                            <option value="1">Sega Mega Drive</option>
                            <option value="2">PlayStation 1 (Classic)</option>
                            <option value="3">Atari 2600</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Адрес доставки</label>
                        <textarea class="form-control bg-dark text-white border-secondary" rows="3"></textarea>
                    </div>

                    <div class="col-12 my-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="giftWrap">
                            <label class="form-check-label" for="giftWrap">Подарочная упаковка в стиле 8-bit</label>
                        </div>
                    </div>

                    <div class="col-12 text-center mt-4">
                        <button type="submit" class="btn btn-warning btn-lg px-5 border-white">Заказать сейчас</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
