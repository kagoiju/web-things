<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">
    <div class="mb-4">
        <a href="index.html" class="btn btn-outline-info">
            <i class="bi bi-arrow-left-circle"></i> ГЛАВНАЯ
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8 neon-card p-4 rounded">
            <h2 class="neon-text mb-4 text-center"><i class="bi bi-joystick"></i> Order Terminal </h2>
            
            <form id="retroForm" name="orderForm" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label text-info">Логин пользователя</label>
                    <input type="text" name="userName" id="userName" class="form-control" placeholder="PLAYER 1">
                </div>

                <div class="col-md-6">
                    <label class="form-label text-info">Почта (для отправки квитанции)</label>
                    <input type="email" name="userEmail" id="userEmail" class="form-control" placeholder="neon@grid.com">
                </div>

                <div class="col-md-12">
                    <label class="form-label text-info">Выберите игру</label>
                    <select name="hardware" id="hardware" class="form-select">
                        <option value="" selected disabled>-- Список игр --</option>
                        <option value="Peak">Peak</option>
                        <option value="PartyAnimals">Party Animals</option>
                        <option value="Viewfinder">Viewfinder</option>
                        <option value="Loddlenaut">Loddlenaut</option>
                        <option value="ContentWarning">Content Warning</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <div class="form-check mt-4">
                        <input class="form-check-input" type="checkbox" name="isGift" id="isGift">
                        <label class="form-check-label text-warning" for="isGift">Это подарок?</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label text-secondary">Текст поздравления</label>
                    <input type="text" name="giftMessage" id="giftMessage" class="form-control" disabled placeholder="Заблокировано...">
                </div>

                <div class="col-12 border-top border-secondary pt-3 mt-4">
    <label class="form-label text-info d-block">Режим получения товара</label>
    
    <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="delivery" id="deliveryInstant" value="instant" checked>
        <label class="form-check-label" for="deliveryInstant">Мгновенно</label>
    </div>
    
    <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="delivery" id="deliveryScheduled" value="scheduled" disabled>
        <label class="form-check-label text-secondary" id="labelScheduled" for="deliveryScheduled">Ко времени (только для подарка)</label>
    </div>

    <div id="timePickerContainer" class="mt-3" style="display: none;">
        <label class="form-label text-warning">Выберите дату и время отправки подарка:</label>
        <input type="datetime-local" name="sendTime" id="sendTime" class="form-control">
    </div>
</div>

                <div class="col-12 text-center mt-5">
                    <button type="submit" id="submit-btn" class="btn btn-invalid btn-lg px-5">Инициализация...</button>
                    <button type="reset" class="btn btn-outline-danger btn-sm ms-3">Сброс</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
